{{ define "content" }}
<section class="mx-auto max-w-2xl">
  <div class="card bg-base-200 shadow-2xl">
    <div class="card-body gap-6">
      <div>
        <p class="text-sm font-medium uppercase tracking-[0.2em] text-base-content/50">First-time setup</p>
        <h2 class="mt-2 text-3xl font-semibold text-base-content">Create admin account</h2>
        <p class="mt-3 text-base-content/70">This creates the first admin user and the initial app settings.</p>
      </div>

      <form method="post" action="/setup" class="space-y-6">
        <div class="grid gap-5 md:grid-cols-2">
          <label class="form-control">
            <span class="label-text mb-2 text-sm font-medium text-base-content/80">Admin name</span>
            <input name="admin_name" value="{{ .AdminName }}" minlength="3" maxlength="50" required class="input input-bordered w-full" placeholder="Phyo Wai Yan">
            <span class="mt-2 text-xs text-base-content/50">3 to 50 characters</span>
          </label>
          <label class="form-control">
            <span class="label-text mb-2 text-sm font-medium text-base-content/80">Admin email</span>
            <input name="admin_email" type="email" value="{{ .AdminEmail }}" required class="input input-bordered w-full" placeholder="admin@example.com">
          </label>
        </div>

        <div class="grid gap-5 md:grid-cols-2">
          <label class="form-control">
            <span class="label-text mb-2 text-sm font-medium text-base-content/80">Password</span>
            <div class="relative">
              <input id="setup-password" name="password" type="password" required class="input input-bordered w-full pr-12" placeholder="Create a strong password">
              <button type="button" data-toggle-password="setup-password" class="btn btn-ghost btn-sm absolute inset-y-0 right-0 my-auto mr-1" aria-label="Toggle password visibility">
                <svg data-eye-open="true" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                  <path d="M10 3c-5 0-8.5 4.5-9.5 7 .8 2.5 4.5 7 9.5 7s8.5-4.5 9.5-7c-.8-2.5-4.5-7-9.5-7Zm0 11a4 4 0 1 1 0-8 4 4 0 0 1 0 8Z"/>
                </svg>
                <svg data-eye-open="false" xmlns="http://www.w3.org/2000/svg" class="hidden h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                  <path d="M2.3 3.7 1 5l3 3c-.8.8-1.5 1.7-2 2.7.8 1.9 4.5 6.3 8 6.3 1.2 0 2.4-.3 3.4-.8l2.6 2.6 1.3-1.3L2.3 3.7Zm7.7 11.6c-2.7 0-5.5-2.8-6.4-4.3.4-.7 1-1.4 1.7-2l1.9 1.9A4 4 0 0 0 10 15a3.9 3.9 0 0 0 1.7-.4l1.5 1.5c-.5.1-1 .2-1.2.2ZM10 5a5 5 0 0 1 5 5c0 .4 0 .7-.1 1.1l1.6 1.6c.8-1 1.5-2 1.8-2.7-.8-1.9-4.5-6.3-8.3-6.3-.9 0-1.8.1-2.5.4L8 5.2C8.6 5.1 9.3 5 10 5Zm0 2a3 3 0 0 1 3 3c0 .5-.1 1-.3 1.4l-4.1-4.1c.4-.2.9-.3 1.4-.3Z"/>
                </svg>
              </button>
            </div>
          </label>
          <label class="form-control">
            <span class="label-text mb-2 text-sm font-medium text-base-content/80">App name</span>
            <input name="app_name" value="{{ .AppName }}" required class="input input-bordered w-full" placeholder="GoAppMon">
          </label>
        </div>

        <button class="btn btn-primary">
          Complete setup
        </button>
      </form>
    </div>
  </div>
</section>
<script>
  document.querySelectorAll('[data-toggle-password]').forEach((button) => {
    button.addEventListener('click', () => {
      const targetId = button.getAttribute('data-toggle-password');
      const input = document.getElementById(targetId);
      if (!input) return;
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      button.querySelectorAll('[data-eye-open]').forEach((icon) => {
        const shouldShow = icon.getAttribute('data-eye-open') === String(isHidden);
        icon.classList.toggle('hidden', !shouldShow);
      });
    });
  });
</script>
{{ end }}
