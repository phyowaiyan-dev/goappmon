{{ define "content" }}
<section class="mx-auto max-w-xl">
  <div class="card bg-base-200 shadow-2xl">
    <div class="card-body gap-8 p-8 md:p-10">
      <div>
        <p class="text-sm font-medium uppercase tracking-[0.2em] text-base-content/50">Admin login</p>
        <h2 class="mt-2 text-3xl font-semibold text-base-content">Sign in</h2>
        <p class="mt-3 text-base-content/70">Use your admin email and password.</p>
      </div>

      <form method="post" action="/admin/login" class="space-y-8">
        <label class="form-control w-full gap-2">
          <span class="label-text mb-2 text-sm font-medium text-base-content/80">Email</span>
          <input name="email" type="email" value="{{ .LoginEmail }}" required class="input input-bordered w-full h-12" placeholder="admin@example.com">
        </label>
        <label class="form-control mt-1 w-full gap-2">
          <span class="label-text mb-2 text-sm font-medium text-base-content/80">Password</span>
          <div class="relative">
            <input id="login-password" name="password" type="password" required class="input input-bordered w-full h-12 pr-12" placeholder="Your password">
            <button type="button" data-toggle-password="login-password" aria-pressed="false" class="btn btn-ghost btn-sm absolute inset-y-0 right-0 my-auto mr-1" aria-label="Toggle password visibility">
              <svg data-eye-open="true" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path d="M10 3c-5 0-8.5 4.5-9.5 7 .8 2.5 4.5 7 9.5 7s8.5-4.5 9.5-7c-.8-2.5-4.5-7-9.5-7Zm0 11a4 4 0 1 1 0-8 4 4 0 0 1 0 8Z"/>
              </svg>
              <svg data-eye-open="false" xmlns="http://www.w3.org/2000/svg" class="hidden h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path d="M2.3 3.7 1 5l3 3c-.8.8-1.5 1.7-2 2.7.8 1.9 4.5 6.3 8 6.3 1.2 0 2.4-.3 3.4-.8l2.6 2.6 1.3-1.3L2.3 3.7Zm7.7 11.6c-2.7 0-5.5-2.8-6.4-4.3.4-.7 1-1.4 1.7-2l1.9 1.9A4 4 0 0 0 10 15a3.9 3.9 0 0 0 1.7-.4l1.5 1.5c-.5.1-1 .2-1.2.2ZM10 5a5 5 0 0 1 5 5c0 .4 0 .7-.1 1.1l1.6 1.6c.8-1 1.5-2 1.8-2.7-.8-1.9-4.5-6.3-8.3-6.3-.9 0-1.8.1-2.5.4L8 5.2C8.6 5.1 9.3 5 10 5Zm0 2a3 3 0 0 1 3 3c0 .5-.1 1-.3 1.4l-4.1-4.1c.4-.2.9-.3 1.4-.3Z"/>
              </svg>
            </button>
          </div>
        </label>
        <button class="btn btn-primary mt-6 w-full h-12">
          Sign in
        </button>
      </form>
    </div>
  </div>
</section>
<script>
  document.querySelectorAll('[data-toggle-password]').forEach((button) => {
    button.addEventListener('click', () => {
      const targetId = button.getAttribute('data-toggle-password');
      const input = document.getElementById(targetId);
      if (!input) return;
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      button.setAttribute('aria-pressed', String(isHidden));
      button.querySelectorAll('[data-eye-open]').forEach((icon) => {
        const shouldShow = icon.getAttribute('data-eye-open') === String(isHidden);
        icon.classList.toggle('hidden', !shouldShow);
      });
    });
  });
</script>
{{ end }}
