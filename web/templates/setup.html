{{ define "body" }}
<section class="mx-auto max-w-2xl rounded-3xl border border-white/10 bg-white/5 p-8 shadow-2xl shadow-black/20 backdrop-blur">
  <div class="mb-8">
    <p class="text-sm font-medium uppercase tracking-[0.2em] text-cyan-300/80">First-time setup</p>
    <h2 class="mt-2 text-3xl font-semibold text-white">Create the first admin account</h2>
    <p class="mt-3 text-slate-300">This wizard will create the initial admin user and seed the application settings row.</p>
  </div>

  <form method="post" action="/setup" class="space-y-6">
    <div class="grid gap-5 md:grid-cols-2">
      <label class="block">
        <span class="mb-2 block text-sm font-medium text-slate-200">Admin name</span>
        <input name="admin_name" value="{{ .AdminName }}" minlength="3" maxlength="50" required class="w-full rounded-2xl border border-white/10 bg-slate-900/80 px-4 py-3 text-white outline-none ring-0 placeholder:text-slate-500 focus:border-cyan-400" placeholder="Phyo Wai Yan">
        <span class="mt-2 block text-xs text-slate-400">3 to 50 characters</span>
      </label>
      <label class="block">
        <span class="mb-2 block text-sm font-medium text-slate-200">Admin email</span>
        <input name="admin_email" type="email" value="{{ .AdminEmail }}" required class="w-full rounded-2xl border border-white/10 bg-slate-900/80 px-4 py-3 text-white outline-none ring-0 placeholder:text-slate-500 focus:border-cyan-400" placeholder="admin@example.com">
      </label>
    </div>

    <div class="grid gap-5 md:grid-cols-2">
      <label class="block">
        <span class="mb-2 block text-sm font-medium text-slate-200">Password</span>
        <div class="relative">
          <input id="setup-password" name="password" type="password" required class="w-full rounded-2xl border border-white/10 bg-slate-900/80 px-4 py-3 pr-12 text-white outline-none ring-0 placeholder:text-slate-500 focus:border-cyan-400" placeholder="Create a strong password">
          <button type="button" data-toggle-password="setup-password" class="absolute inset-y-0 right-0 flex items-center px-4 text-slate-400 transition hover:text-white" aria-label="Toggle password visibility">
            <svg data-eye-open="true" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
              <path d="M10 3c-5 0-8.5 4.5-9.5 7 .8 2.5 4.5 7 9.5 7s8.5-4.5 9.5-7c-.8-2.5-4.5-7-9.5-7Zm0 11a4 4 0 1 1 0-8 4 4 0 0 1 0 8Z"/>
            </svg>
          </button>
        </div>
      </label>
      <label class="block">
        <span class="mb-2 block text-sm font-medium text-slate-200">App name</span>
        <input name="app_name" value="{{ .AppName }}" required class="w-full rounded-2xl border border-white/10 bg-slate-900/80 px-4 py-3 text-white outline-none ring-0 placeholder:text-slate-500 focus:border-cyan-400" placeholder="GoAppMon">
      </label>
    </div>

    <button class="inline-flex items-center justify-center rounded-2xl bg-cyan-400 px-5 py-3 font-semibold text-slate-950 transition hover:bg-cyan-300">
      Complete setup
    </button>
  </form>
</section>
<script>
  document.querySelectorAll('[data-toggle-password]').forEach((button) => {
    button.addEventListener('click', () => {
      const targetId = button.getAttribute('data-toggle-password');
      const input = document.getElementById(targetId);
      if (!input) return;
      input.type = input.type === 'password' ? 'text' : 'password';
    });
  });
</script>
{{ end }}
