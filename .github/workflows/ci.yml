name: CI

on:
  push:
    branches:
      - develop
  pull_request:
  workflow_dispatch:

jobs:
  fmt:
    name: Go Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6.5.0
        with:
          go-version: "1.26.1"
          check-latest: true

      - name: Verify gofmt
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "The following files need gofmt:"
            gofmt -l .
            exit 1
          fi

  lint:
    name: GolangCI-Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6.5.0
        with:
          go-version: "1.26.1"
          check-latest: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.2
          args: --timeout=5m

  test:
    name: Go Test
    runs-on: ubuntu-latest
    needs:
      - fmt
      - lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6.5.0
        with:
          go-version: "1.26.1"
          check-latest: true
          cache: true

      - name: Download modules
        run: go mod download

      - name: Run tests
        run: go test ./...

      - name: Build
        run: go build ./...
